# Dependabot version updates.
# - cargo:          the Tauri UI dependency tree (Cargo.lock, ~439 crates)
# - gomod:          quiet today (stdlib-only) but watches the go toolchain
# - github-actions: keeps SHA-pinned actions current; Dependabot bumps the SHA
#                   and updates the trailing "# vX.Y.Z" comment automatically.
version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/ui/src-tauri"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels: ["dependencies", "rust"]
    groups:
      cargo-minor-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels: ["dependencies", "go"]
    groups:
      gomod-minor-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels: ["dependencies", "github-actions"]
    groups:
      actions-minor-patch:
        update-types: ["minor", "patch"]
