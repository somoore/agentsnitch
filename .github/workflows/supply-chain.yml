# Supply-chain gate. Mirrors the local pre-commit/pre-push checks on a clean
# checkout so a skipped local hook cannot bypass policy.
#
# All actions are pinned by full commit SHA (not tag) to defeat tag-mutation
# supply-chain attacks (e.g. tj-actions/changed-files, March 2025). Dependabot
# keeps the SHAs current and updates the trailing version comments.
name: supply-chain

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: supply-chain-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Changes
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.docs.outputs.docs_only }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Detect docs-only change
        id: docs
        shell: bash
        run: |
          set -euo pipefail

          docs_only=false
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            range="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
          elif [ "${{ github.event_name }}" = "push" ]; then
            range="${{ github.event.before }}..${{ github.sha }}"
          else
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          mapfile -t files < <(git diff --name-only "$range")
          if [ "${#files[@]}" -gt 0 ]; then
            docs_only=true
            for file in "${files[@]}"; do
              case "$file" in
                *.md|*.MD|*.markdown|*.MARKDOWN) ;;
                *) docs_only=false; break ;;
              esac
            done
          fi

          printf 'docs_only=%s\n' "$docs_only" >> "$GITHUB_OUTPUT"
          printf 'docs_only=%s\n' "$docs_only"

  go:
    name: Go (build / vet / test / vuln / deps)
    needs: changes
    if: needs.changes.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.4"
          check-latest: false
          cache: true

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: shellcheck (scripts)
        run: shellcheck --severity=warning --shell=bash scripts/*.sh extension/*.sh

      - name: go build
        run: go build ./...

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./...

      - name: dependency tripwire (drift / verify / stdlib-only)
        run: ./scripts/check-deps.sh

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: govulncheck
        run: govulncheck ./...

  network-extension-invariants:
    name: Network Extension static invariants
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Check Network Extension invariants
        run: ./scripts/check-network-extension-invariants.sh

      - name: Regression-test Network Extension invariants
        run: ./scripts/test-network-extension-invariants.sh

  rust:
    name: Rust (build / test / clippy / fmt / deny)
    needs: changes
    if: needs.changes.outputs.docs_only != 'true'
    # macos-latest is the real ship target (Tauri uses WKWebView on macOS) and
    # avoids the Linux GTK/WebKit2GTK system-lib install.
    runs-on: macos-latest
    defaults:
      run:
        working-directory: ui/src-tauri
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          components: clippy, rustfmt
          cache: false

      - name: cargo build --locked
        run: cargo build --locked

      - name: cargo test --locked --lib
        run: cargo test --locked --lib

      - name: cargo clippy --locked -D warnings
        run: cargo clippy --locked -- -D warnings

      - name: cargo fmt --check
        run: cargo fmt --check

      # cargo-deny covers advisories (same RustSec DB as cargo-audit), licenses,
      # sources, and bans — so cargo-audit is intentionally not run (redundant).
      # git must be on PATH for the advisory-DB fetch (cargo-deny >= 0.19.1).
      - name: Install cargo-deny
        run: cargo install cargo-deny --version 0.19.8 --locked

      - name: cargo deny check
        run: cargo deny check

  secrets:
    name: Secrets (gitleaks + TruffleHog OSS)
    needs: changes
    if: needs.changes.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: gitleaks
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          # gitleaks-action requires GITHUB_TOKEN to scan pull_request events
          # (used only to read the PR's commit range; no secret findings here).
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

      - name: TruffleHog OSS verified secrets
        uses: trufflesecurity/trufflehog@d411fff7b8879a62509f3fa98c07f247ac089a51 # v3.95.5
        with:
          path: ./
          version: 3.95.5
          extra_args: --only-verified
